<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FlashKids ✨</title>
<style>
  :root {
    --bg:      #fff9f0;
    --card:    #ffffff;
    --accent:  #ff6b6b;
    --accent2: #4ecdc4;
    --accent3: #ffe66d;
    --text:    #2d2d2d;
    --muted:   #888;
    --radius:  18px;
    --shadow:  0 6px 24px rgba(0,0,0,.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); font-family: 'Nunito', 'Segoe UI', sans-serif; color: var(--text); }
  #app { max-width: 480px; margin: 0 auto; min-height: 100dvh; display: flex; flex-direction: column; }

  .btn {
    border: none; cursor: pointer; font-size: 1rem; font-weight: 700;
    padding: .7rem 1.4rem; border-radius: 50px; transition: transform .1s, opacity .15s;
  }
  .btn:active { transform: scale(.96); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--accent2); color: #fff; }
  .btn-ghost { background: transparent; color: var(--muted); font-weight: 600; }
  input, select {
    width: 100%; padding: .65rem 1rem; border: 2px solid #e0d8d0;
    border-radius: 12px; font-size: 1rem; background: var(--card);
    color: var(--text); outline: none;
  }
  input:focus, select:focus { border-color: var(--accent2); }
  .error-msg { color: var(--accent); font-size: .85rem; margin-top: .35rem; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 1.2rem; background: var(--card); box-shadow: 0 2px 8px rgba(0,0,0,.06);
    position: sticky; top: 0; z-index: 10;
  }
  .topbar-logo { font-size: 1.4rem; font-weight: 900; color: var(--accent); }
  .topbar-child { font-size: .9rem; color: var(--muted); cursor: pointer; }

  .child-list { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; padding: 1.5rem; }
  .child-card {
    background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 1.4rem 1rem; text-align: center; cursor: pointer; transition: transform .15s;
  }
  .child-card:active { transform: scale(.97); }
  .child-avatar { font-size: 3rem; margin-bottom: .4rem; }
  .child-name { font-weight: 800; font-size: 1.05rem; }
  .child-age { color: var(--muted); font-size: .85rem; }
  .add-child-card { border: 3px dashed #e0d8d0; background: transparent; box-shadow: none; color: var(--muted); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: .4rem; font-size: .95rem; font-weight: 700; }

  .deck-list { padding: 1rem 1.2rem; display: flex; flex-direction: column; gap: .75rem; }
  .deck-row {
    background: var(--card); border-radius: var(--radius); padding: 1rem 1.3rem;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: var(--shadow); cursor: pointer; transition: transform .12s;
  }
  .deck-row:active { transform: scale(.98); }
  .deck-title { font-weight: 800; font-size: 1.05rem; }
  .deck-meta { color: var(--muted); font-size: .82rem; }
  .deck-arrow { font-size: 1.4rem; color: var(--accent2); }
  .new-deck-btn { margin: .5rem 1.2rem; }

  .flash-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; gap: 1.5rem; }
  .card-flip-container { width: 300px; height: 320px; perspective: 900px; cursor: pointer; }
  .card-inner { position: relative; width: 100%; height: 100%; transition: transform .5s; transform-style: preserve-3d; }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face, .card-back {
    position: absolute; width: 100%; height: 100%;
    backface-visibility: hidden; border-radius: 24px; overflow: hidden;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    box-shadow: var(--shadow);
  }
  .card-face { background: var(--card); }
  .card-back { background: linear-gradient(135deg, var(--accent2), var(--accent3)); transform: rotateY(180deg); }
  .card-img { width: 100%; height: 230px; object-fit: cover; }
  .card-word-back { font-size: 2.4rem; font-weight: 900; color: #fff; text-shadow: 0 2px 6px rgba(0,0,0,.18); }
  .card-tap-hint { color: var(--muted); font-size: .8rem; }
  .flash-progress { color: var(--muted); font-size: .9rem; }
  .flash-result { display: flex; gap: .8rem; }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.45);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 100;
  }
  .modal {
    background: var(--card); border-radius: 24px 24px 0 0;
    width: 100%; max-width: 480px; padding: 1.8rem 1.5rem 2.4rem;
    display: flex; flex-direction: column; gap: 1rem;
  }
  .modal-title { font-size: 1.25rem; font-weight: 900; }
  .modal-actions { display: flex; gap: .7rem; }

  .spinner { text-align: center; padding: 3rem; color: var(--muted); font-size: 1.1rem; }
  .spinner::after { content: ''; display: inline-block; width: 1.4em; height: 1.4em; border: 3px solid var(--accent2); border-top-color: transparent; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-left: .5rem; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .page-title { padding: 1.2rem 1.2rem .3rem; font-size: 1.4rem; font-weight: 900; }
  .page-sub { padding: 0 1.2rem .8rem; color: var(--muted); font-size: .9rem; }
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── State ──────────────────────────────────
const S = {
  scr: 'children',
  children: [],
  child: null,
  decks: {},      // { [childId]: [{id, title, topic, language, created_at, cards:[...]}] }
  deck: null,
  cards: [],
  flashIdx: 0,
  flipped: false,
  loading: false,
  err: '',
  modal: null,
  f: {}
};

// ── localStorage ───────────────────────────
function load() {
  try {
    S.children = JSON.parse(localStorage.getItem('fk_children') || '[]');
    S.decks    = JSON.parse(localStorage.getItem('fk_decks')    || '{}');
  } catch { S.children = []; S.decks = {}; }
}
function saveChildren() { localStorage.setItem('fk_children', JSON.stringify(S.children)); }
function saveDecks()    { localStorage.setItem('fk_decks',    JSON.stringify(S.decks));    }

// ── Render ─────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if      (S.scr === 'children') app.innerHTML = renderChildren();
  else if (S.scr === 'decks')    app.innerHTML = renderDecks();
  else if (S.scr === 'flash')    app.innerHTML = renderFlash();
  if (S.modal === 'addChild') app.insertAdjacentHTML('beforeend', renderAddChildModal());
  if (S.modal === 'addDeck')  app.insertAdjacentHTML('beforeend', renderAddDeckModal());
}

// ── Children ───────────────────────────────
function renderChildren() {
  return `
  <div class="topbar"><span class="topbar-logo">FlashKids ✨</span></div>
  <div class="page-title">Who's learning today?</div>
  <div class="child-list">
    ${S.children.map(c => `
      <div class="child-card" onclick="selectChild('${c.id}')">
        <div class="child-avatar">${esc(c.avatar)}</div>
        <div class="child-name">${esc(c.name)}</div>
        <div class="child-age">${c.age} yr</div>
      </div>`).join('')}
    <div class="child-card add-child-card" onclick="S.modal='addChild';S.f={};S.err='';render()">
      <span style="font-size:2rem">+</span><span>Add child</span>
    </div>
  </div>`;
}

function renderAddChildModal() {
  const avatars = ['🐶','🐱','🐭','🐰','🦊','🐻','🐼','🐨','🐯','🦁'];
  const sel = S.f.avatar || avatars[0];
  return `
  <div class="modal-overlay" onclick="if(event.target===this){S.modal=null;render()}">
    <div class="modal">
      <div class="modal-title">New child profile</div>
      <input type="text" placeholder="Child's name" value="${esc(S.f.cname||'')}" oninput="S.f.cname=this.value" />
      <select onchange="S.f.age=this.value">
        <option value="">Age…</option>
        ${[1,2,3,4].map(a=>`<option value="${a}" ${S.f.age==a?'selected':''}>${a} year${a>1?'s':''}</option>`).join('')}
      </select>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap">
        ${avatars.map(av=>`<span style="font-size:2rem;cursor:pointer;opacity:${sel===av?1:.4}" onclick="S.f.avatar='${av}';render()">${av}</span>`).join('')}
      </div>
      ${S.err ? `<div class="error-msg">${esc(S.err)}</div>` : ''}
      <div class="modal-actions">
        <button class="btn btn-primary" style="flex:1" onclick="addChild()">Add</button>
        <button class="btn btn-ghost" onclick="S.modal=null;render()">Cancel</button>
      </div>
    </div>
  </div>`;
}

function addChild() {
  S.err = '';
  const { cname, age, avatar } = S.f;
  if (!cname || !age) { S.err = 'Name and age are required'; render(); return; }
  const child = { id: uid(), name: cname.trim(), age: parseInt(age), avatar: avatar || '🐶' };
  S.children.push(child);
  saveChildren();
  S.modal = null; S.f = {};
  render();
}

function selectChild(id) {
  S.child = S.children.find(c => c.id === id);
  S.scr = 'decks';
  render();
}

// ── Decks ──────────────────────────────────
function getChildDecks() { return S.decks[S.child.id] || []; }

function renderDecks() {
  const decks = getChildDecks();
  return `
  <div class="topbar">
    <span class="topbar-logo">FlashKids ✨</span>
    <span class="topbar-child" onclick="S.scr='children';render()">${esc(S.child.avatar)} ${esc(S.child.name)}</span>
  </div>
  <div class="page-title">Flashcard decks</div>
  <div class="page-sub">Pick a deck or create a new one</div>
  <button class="btn btn-primary new-deck-btn" onclick="S.modal='addDeck';S.f={};S.err='';render()">+ New deck</button>
  ${S.loading ? '<div class="spinner">Generating cards…</div>' : `
  <div class="deck-list">
    ${decks.length === 0 ? '<div class="page-sub" style="padding-top:.5rem">No decks yet — create one!</div>' : ''}
    ${decks.map(d => `
      <div class="deck-row" onclick="openDeck('${d.id}')">
        <div>
          <div class="deck-title">${esc(d.title)}</div>
          <div class="deck-meta">${new Date(d.created_at).toLocaleDateString()} · ${d.cards.length} cards</div>
        </div>
        <span class="deck-arrow">▶</span>
      </div>`).join('')}
  </div>`}`;
}

function renderAddDeckModal() {
  const langs = [['en','English'],['es','Spanish'],['fr','French'],['de','German'],['ru','Russian']];
  return `
  <div class="modal-overlay" onclick="if(event.target===this){S.modal=null;render()}">
    <div class="modal">
      <div class="modal-title">New deck</div>
      <input type="text" placeholder="Topic (e.g. Animals, Fruit, Colors…)"
        value="${esc(S.f.topic||'')}" oninput="S.f.topic=this.value" />
      <select onchange="S.f.lang=this.value">
        ${langs.map(([v,l])=>`<option value="${v}" ${(S.f.lang||'en')===v?'selected':''}>${l}</option>`).join('')}
      </select>
      <select onchange="S.f.count=this.value">
        ${[4,6,8,10].map(n=>`<option value="${n}" ${(S.f.count||6)==n?'selected':''}>${n} cards</option>`).join('')}
      </select>
      ${S.err ? `<div class="error-msg">${esc(S.err)}</div>` : ''}
      <div class="modal-actions">
        <button class="btn btn-primary" style="flex:1" onclick="createDeck()">Generate ✨</button>
        <button class="btn btn-ghost" onclick="S.modal=null;render()">Cancel</button>
      </div>
    </div>
  </div>`;
}

async function createDeck() {
  S.err = '';
  const { topic, lang, count } = S.f;
  if (!topic) { S.err = 'Topic is required'; render(); return; }
  S.modal = null; S.loading = true; render();
  try {
    const data = await api('POST', '/api/decks', {
      topic, language: lang || 'en', card_count: parseInt(count) || 6,
    });
    const deck = {
      id: uid(), title: topic, topic, language: lang || 'en',
      created_at: new Date().toISOString(), cards: data.cards,
    };
    if (!S.decks[S.child.id]) S.decks[S.child.id] = [];
    S.decks[S.child.id].unshift(deck);
    saveDecks();
    S.loading = false;
    openDeck(deck.id);
  } catch (e) {
    S.err = e.message; S.loading = false; render();
  }
}

function openDeck(deckId) {
  S.deck = getChildDecks().find(d => d.id === deckId);
  S.cards = S.deck.cards;
  S.flashIdx = 0; S.flipped = false; S.scr = 'flash';
  render();
}

// ── Flash ──────────────────────────────────
function renderFlash() {
  const total = S.cards.length;
  if (total === 0) return `<div class="spinner">No cards</div>`;

  if (S.flashIdx >= total) {
    return `
    <div class="topbar">
      <span class="topbar-logo">FlashKids ✨</span>
      <button class="btn btn-ghost" onclick="S.scr='decks';render()">Back</button>
    </div>
    <div class="flash-wrap">
      <div style="font-size:4rem">🎉</div>
      <div style="font-size:1.6rem;font-weight:900">All done!</div>
      <div style="color:var(--muted)">Great job, ${esc(S.child.name)}!</div>
      <button class="btn btn-primary" onclick="S.flashIdx=0;S.flipped=false;render()">Play again</button>
      <button class="btn btn-ghost" onclick="S.scr='decks';render()">Choose deck</button>
    </div>`;
  }

  const card = S.cards[S.flashIdx];
  return `
  <div class="topbar">
    <button class="btn btn-ghost" onclick="S.scr='decks';render()">← Back</button>
    <span style="font-weight:800">${esc(S.deck?.title || '')}</span>
    <span style="color:var(--muted);font-size:.9rem">${S.flashIdx+1}/${total}</span>
  </div>
  <div class="flash-wrap">
    <div class="flash-progress">${S.flashIdx+1} of ${total}</div>
    <div class="card-flip-container" onclick="flipCard()">
      <div class="card-inner ${S.flipped ? 'flipped' : ''}">
        <div class="card-face">
          ${card.image_url
            ? `<img class="card-img" src="${esc(card.image_url)}" alt="${esc(card.word)}" />`
            : `<div style="font-size:5rem;padding:2rem">${randomEmoji(card.word)}</div>`}
          <div class="card-tap-hint" style="padding:.5rem">Tap to reveal</div>
        </div>
        <div class="card-back">
          <div class="card-word-back">${esc(card.word)}</div>
          <button class="btn" style="background:rgba(255,255,255,.25);color:#fff;margin-top:1rem"
            onclick="event.stopPropagation();speak('${esc(card.word)}','${esc(card.language)}')">🔊 Say it</button>
        </div>
      </div>
    </div>
    ${S.flipped ? `
    <div class="flash-result">
      <button class="btn btn-primary" onclick="recordResult(true)">✓ Got it!</button>
      <button class="btn" style="background:#ffeaea;color:var(--accent)" onclick="recordResult(false)">✗ Again</button>
    </div>` : `<div style="color:var(--muted);font-size:.85rem">Tap the card to flip</div>`}
  </div>`;
}

function flipCard() {
  S.flipped = !S.flipped; render();
  if (S.flipped) speak(S.cards[S.flashIdx].word, S.cards[S.flashIdx].language);
}

function speak(word, lang) {
  if (!window.speechSynthesis) return;
  const utt = new SpeechSynthesisUtterance(word);
  utt.lang = lang || 'en-US'; utt.rate = 0.85;
  speechSynthesis.cancel(); speechSynthesis.speak(utt);
}

function recordResult(correct) {
  const card = S.cards[S.flashIdx];
  card.seen += 1; if (correct) card.correct += 1;
  saveDecks();
  S.flashIdx += 1; S.flipped = false; render();
}

// ── Helpers ────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if (res.status === 204) return null;
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

function esc(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function uid() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }

const WORD_EMOJI = { cat:'🐱',dog:'🐶',apple:'🍎',banana:'🍌',car:'🚗',sun:'☀️',moon:'🌙',fish:'🐟',bird:'🐦',flower:'🌸' };
function randomEmoji(word) { return WORD_EMOJI[word?.toLowerCase()] || '✨'; }

// ── Boot ───────────────────────────────────
load();
render();
</script>
</body>
</html>
